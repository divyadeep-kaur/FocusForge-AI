{% extends "base.html" %}
{% block title %}Sign Up | FocusForge AI{% endblock %}
{% block content %}
<section class="auth-wrap">
    <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">F</span>
        <span>FocusForge AI</span>
    </a>
    <form class="auth-card" method="POST">
        <h1>Create your forge</h1>
        <p>Start tracking tasks, streaks, rewards, and focus sessions.</p>
        <label>Username<input name="username" required minlength="3" autocomplete="username"></label>
        <label>Email<input type="email" name="email" required autocomplete="email"></label>
        <label>Password<input type="password" name="password" required minlength="6" autocomplete="new-password"></label>
        <button class="btn primary full" type="submit">Create account</button>
        <span class="form-note">Already registered? <a href="{{ url_for('login') }}">Log in</a></span>
    </form>
</section>
{% endblock %}
